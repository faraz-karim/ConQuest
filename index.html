<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conquest Companion App</title>
    <link rel="icon" type="image/png" href="conquest_logo.png">
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff;
            --accent-blue: #3b82f6; --accent-red: #ef4444; --accent-green: #22c55e;
            --accent-yellow: #eab308; --accent-purple: #a855f7; --border-radius: 8px;
        }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        .content-area {
            flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 120px;
            max-width: 600px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }
        h1, h2, h3, h4 { margin: 0 0 10px 0; }
        .section {
            background-color: var(--card-bg); padding: 16px; margin-bottom: 16px;
            border-radius: var(--border-radius); box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button {
            background-color: #333; color: white; border: none; padding: 16px 12px;
            font-size: 1.1rem; border-radius: var(--border-radius); cursor: pointer;
            font-weight: bold; touch-action: manipulation; width: 100%; box-sizing: border-box;
            transition: background-color 0.2s;
        }
        button:active { opacity: 0.8; }
        button:disabled { background-color: #444 !important; color: #888 !important; cursor: not-allowed; }
        .btn-red { background-color: var(--accent-red); }
        .btn-green { background-color: var(--accent-green); }
        .btn-blue { background-color: var(--accent-blue); }
        .btn-purple { background-color: var(--accent-purple); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        .hp-display { font-size: 4rem; font-weight: bold; text-align: center; margin: 10px 0; }
        .status-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .status-badge { display: flex; justify-content: space-between; padding: 10px; border-radius: 8px; margin-bottom: 5px; font-weight: bold; border: 1px solid;}
        .bp { background: rgba(34,197,94,0.1); border-color: var(--accent-green); color: var(--accent-green); }
        .bs { background: rgba(234,179,8,0.1); border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .ba { background: rgba(150,150,150,0.1); border-color: #aaa; color: #ccc; }
        .card-item { background: #2a2a2a; padding: 12px; border-radius: 8px; margin-bottom: 8px; }
        .card-actions { display: flex; gap: 8px; margin-top: 8px; }
        select, input[type="number"] { background: #333; color: white; border: none; padding: 16px; border-radius: 8px; width: 100%; margin-bottom: 8px; font-size: 1rem; box-sizing: border-box;}
        
        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .toggle-btn { padding: 10px 16px; background-color: #444; border-radius: 20px; width: auto; }
        .toggle-btn.active { background-color: var(--accent-blue); }
        .toggle-btn.locked { background-color: #222; color: #666; }

        .output-box { background: #000; border: 2px solid #333; padding: 16px; border-radius: 8px; min-height: 150px; margin-bottom: 16px; text-align: center;}
        .boss-tracker { background: #220000; border: 2px solid var(--accent-red); padding: 16px; border-radius: 8px; display: none; }
        .boss-hp { font-size: 3rem; text-align: center; margin: 10px 0; color: var(--accent-red); font-weight: bold; }
        .boss-clash-box { background: #111; padding: 12px; border-radius: 8px; text-align: left; margin-bottom: 15px;}
        .clash-checkbox { width: 24px; height: 24px; vertical-align: middle; margin-right: 10px;}

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            display: flex; border-top: 2px solid #333; height: 70px; z-index: 100;
        }
        .nav-btn {
            flex: 1; background: transparent; color: #888; font-size: 1.2rem;
            border-radius: 0; display: flex; align-items: center; justify-content: center;
        }
        .nav-btn.active { color: var(--accent-blue); border-bottom: 4px solid var(--accent-blue); background: #1a1a1a; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .shop-container { text-align: left; background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px;}

        /* Icon Selection Modal */
        #icon-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .icon-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px;
            max-width: 400px; width: 100%;
        }
        .icon-grid img {
            width: 100%; max-width: 80px; height: auto; margin: 0 auto;
            cursor: pointer; border: 3px solid #333; border-radius: 8px; background: #222;
            transition: border-color 0.2s;
        }
        .icon-grid img:hover { border-color: var(--accent-blue); }

/* --- BOSS CONSOLE UI --- */
/* --- BOSS CONSOLE UI --- */
        .boss-console {
            display: flex; flex-direction: column; gap: 12px; 
            background-color: #121216; padding: 15px; border-radius: 8px; 
            margin-bottom: 15px; border: 2px solid #333; box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .boss-image-container {
            width: 100%; border-radius: 6px; border: 2px solid #444; 
            overflow: hidden; background: #000; display: flex; justify-content: center;
        }
        .boss-image-container img {
            width: 100%; max-height: 250px; object-fit: cover; 
            image-rendering: pixelated; display: block;
        }
        .hp-bar-wrap {
            width: 100%; height: 22px; border: 2px solid #444; background: #000; 
            border-radius: 4px; overflow: hidden; margin: 4px 0;
        }
        .hp-bar-fill {
            height: 100%; background-color: var(--accent-red); 
            transition: width 0.3s ease-in-out;
        }
        .boss-actions-row {
            display: flex; gap: 8px; width: 100%; margin-top: 5px;
        }
        .btn-console { 
            flex: 1; font-size: 0.95rem; font-weight: bold; padding: 12px 4px; 
            border: 2px solid #444; border-radius: 6px; text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            line-height: 1.2;
        }
        .adren-row { display: flex; gap: 6px; margin-top: 5px; width: 100%; }
        .adren-btn { 
            flex: 1; padding: 12px 0; font-size: 1.2rem; font-weight: bold; 
            background: #222; color: #fff; border: 2px solid #555; border-radius: 4px;
        }
        .adren-btn:active { background: var(--accent-yellow); color: #000; }
        .btn-exhausted { opacity: 0.4 !important; cursor: not-allowed !important; background: #333 !important; }
    </style>
</head>

        // --- PLAYER STATE & LOGIC ---
        let hp = 100;
        let poisonCount = 0; 
        let slowCount = 0;
        let armorEquipped = false;
        let sprintUsed = false;
        let hand = [];
        let maxAP = 3;
        let currentAP = 3;

        function updatePlayerUI() {
            document.getElementById('hp-display').innerText = hp;
            document.getElementById('ap-display').innerText = currentAP; 
            
            let statusHTML = '';
            if (poisonCount > 0) statusHTML += `<div class="status-badge bp"><span>Poison: ${poisonCount} turns</span><button style="width:auto; padding:5px; background:none; border:1px solid currentColor; color:inherit;" onclick="clearStatus('poison')">X</button></div>`;
            if (armorEquipped) statusHTML += `<div class="status-badge ba"><span>Magic Armor (-5 Dmg)</span><button style="width:auto; padding:5px; background:none; border:1px solid currentColor; color:inherit;" onclick="clearStatus('armor')">X</button></div>`;
            
            document.getElementById('status-container').innerHTML = statusHTML;

            const cc = document.getElementById('card-count');
            cc.innerText = `${hand.length} / 5 Cards`;
            cc.style.color = hand.length >= 5 ? 'var(--accent-red)' : 'inherit';
            document.getElementById('add-card-btn').disabled = hand.length >= 5;
            
            let handHTML = '';
            hand.forEach((cardName, index) => {
                let item = ITEM_DB[cardName] || { ap: 0, desc: "Unknown Item", type: "unknown" };
                let canAfford = currentAP >= item.ap;
                let btnClass = canAfford ? "btn-green" : "btn-exhausted";
                let btnText = item.type === "equip" ? "Equip" : "Use";
                
                handHTML += `
                    <div class="card-item" style="${!canAfford ? 'opacity: 0.6;' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <strong style="color:var(--accent-yellow);">${cardName}</strong>
                            <span style="background:#000; padding:2px 8px; border-radius:12px; font-size:0.8rem; border:1px solid var(--accent-blue); color:var(--accent-blue);">
                                ${item.ap} AP
                            </span>
                        </div>
                        <div style="font-size:0.85rem; color:#aaa; margin: 4px 0;">${item.desc}</div>
                        <div class="card-actions">
                            <button class="${btnClass}" ${!canAfford ? 'disabled' : ''} onclick="useItem(${index}, '${cardName}')">${btnText}</button>
                            <button style="background:#444;" onclick="discardItem(${index})">Discard</button>
                        </div>
                    </div>`;
            });
            document.getElementById('hand-container').innerHTML = handHTML;
        }
        function adjustHP(amt) { hp += amt; if(hp>100) hp=100; if(hp<0) hp=0; updatePlayerUI(); }
        
        function takeDamage(rawDmg) {
            let actualDmg = rawDmg;
            let shattered = false;
            
            if (armorEquipped) {
                actualDmg = Math.max(0, rawDmg - 5);
                if (rawDmg >= 15) {
                    armorEquipped = false;
                    shattered = true;
                }
            }
            
            hp -= actualDmg;
            if(hp < 0) hp = 0;
            updatePlayerUI();
            
            if (shattered) {
                setTimeout(() => alert("Your Magic Armor shattered from a massive hit!"), 100);
            }
        }

        function addStatus(type) { if(type==='poison') poisonCount=3; if(type==='slow') slowCount=1; updatePlayerUI(); }
        
        function clearStatus(type) { 
            if(type==='poison') poisonCount=0; 
            if(type==='slow') slowCount=0; 
            if(type==='armor') armorEquipped = false;
            updatePlayerUI(); 
        }

        function toggleSprint() {
            if (sprintUsed) return;
            sprintUsed = true;
            const btn = document.getElementById('sprint-btn');
            btn.innerText = "Sprint Used";
            btn.classList.add("locked");
            btn.classList.remove("active");
        }
        
        function manualAddCard() { 
            const cardName = document.getElementById('card-select').value;
            if(hand.length < 5) { hand.push(cardName); updatePlayerUI(); }
            else { alert("Hand full! Discard first."); }
        }
        
        function claimRelic(cardName, btnElement) {
            if (hand.length < 5) {
                hand.push(cardName);
                updatePlayerUI();
                btnElement.innerText = "Sent to Hand!";
                btnElement.disabled = true;
                btnElement.style.backgroundColor = "var(--accent-green)";
            } else {
                alert("Hand full! You must go to 'My Player' tab and discard something first.");
            }
        }
        
        function discardItem(idx) { hand.splice(idx, 1); updatePlayerUI(); }
        
        // function useItem(idx, type) {

        //     if(type==='heal40') adjustHP(40);
        //     if(type==='cure') { adjustHP(5); poisonCount=0; slowCount=0; }
        //     if(type==='equipArmor') armorEquipped = true;
        //     discardItem(idx);
        // }

        //     updatePlayerUI();

        //     btn.style.backgroundColor = "#555";
        //     setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = "var(--accent-blue)"; }, 1000);
        // }
        
        function useItem(idx, cardName) {
            let item = ITEM_DB[cardName];
            if (!item) return;

            if (currentAP < item.ap) {
                alert("Not enough Action Points!");
                return;
            }

            currentAP -= item.ap;

            if (item.type === 'heal') {
                adjustHP(item.val);
                if (item.cure) { poisonCount = 0; slowCount = 0; }
            } 
            else if (item.type === 'equip') {
                if (item.effect === 'armor_equip') armorEquipped = true;
                if (item.effect === 'block_50') alert("Steel Shield Active! Manually halve incoming damage this turn.");
                if (item.effect === 'poison_block') alert("Poison Shield Active! The next entity to hit you takes poison.");
            } 
            else if (item.type === 'attack') {
                alert(`⚔️ You cast/swing ${cardName} for ${item.val || 'an effect'}! (Tell your opponent)`);
            }
            else if (item.type === 'utility' || item.type === 'buff') {
                alert(`✨ You used ${cardName}! (${item.desc})`);
            }

            discardItem(idx);
        }
        
        function endTurn() {
            if(poisonCount > 0) { takeDamage(5); poisonCount--; }
            if(slowCount > 0) slowCount--;
            
            currentAP = maxAP; // Reset AP
            updatePlayerUI();
            
            const btn = document.querySelector('.end-turn-btn');
            const originalText = btn.innerText;
            btn.innerText = "AP REFRESHED / TURN ENDED";
            btn.style.backgroundColor = "#555";
            setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = "var(--accent-blue)"; }, 1500);
        }

function generateRelicDeck() {
    let generatedDeck = [];
    for (const [itemName, itemData] of Object.entries(ITEM_DB)) {
        if (itemData.pool === "relic") {
            let copies = (itemName === "Magic Armor") ? 1 : 3;
            for (let i = 0; i < copies; i++) {
                // Store object to match drawCard logic
                generatedDeck.push({ n: itemName, e: itemData.desc }); 
            }
        }
    }
    return shuffle(generatedDeck);
}

const initMonsters = [

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

if(type === 'boss') {

        }
        // --- THE PIXEL-ART CLASH SYSTEM ---
        function renderBossUI() {

            let b = currentBoss;

            // Resolve Dynamic Boss Intent at Round Start
            let bActionText = "";
            let bActionDmg = 0;
            
            if (b.id === 'golem') { bActionText = "Smashes the ground!"; bActionDmg = 15; }
            if (b.id === 'dragon') {
                let isBite = Math.random() < 0.5;
                bActionText = isBite ? "Toxic Bite!" : "Venom Breath! (+Poison)";
                bActionDmg = isBite ? 10 : 5;
                b.current_effect = isBite ? "none" : "poison";
            }
            if (b.id === 'vampire') {
                let isBolt = bossRound % 2 !== 0; 
                bActionText = isBolt ? "Shadow Bolt!" : "Void Blast!";
                bActionDmg = isBolt ? 10 : 20;
            }
            if (b.id === 'knight') { bActionText = "Unstoppable Strike!"; bActionDmg = knightUnstoppableDmg; }
            if (b.id === 'illusionist') { bActionText = "Casts Magic Blast!"; bActionDmg = 15; }

            b.intent_dmg = bActionDmg; 

            // Format GIF filename (e.g., "Black Knight" -> "black_knight.gif")
            let gifFileName = b.n.toLowerCase().replace(/ /g, '_') + '.gif';

            let html = `
                <div class="boss-console">
                    <!-- Top: Name & GIF -->
                    <h2 style="color:var(--accent-red); margin:0;">${b.n}</h2>
                    <div class="boss-image-container">
                        <img src="boss/${gifFileName}" alt="${b.n}" onerror="this.parentElement.style.display='none'">
                    </div>

                    <!-- Middle: Stats & Intent -->
                    <div style="text-align: left;">
                        <h4 style="color:#888; margin: 0 0 2px 0;">ROUND ${bossRound}</h4>
                        
                        <div class="hp-bar-wrap">
                            <div class="hp-bar-fill" style="width: ${(currentBossHP / b.max_h) * 100}%"></div>
                        </div>
                        <div style="font-size:1.4rem; font-weight:bold; color:var(--accent-red); margin-bottom:10px;">${currentBossHP} / ${b.max_h} HP</div>
                        
                        <div style="background:#1a1a1a; padding:8px; border-radius:4px; margin-bottom:10px; border-left:3px solid var(--accent-yellow);">
                            <strong style="color:var(--accent-yellow); font-size:0.85rem;">INTENT:</strong><br>
                            <span style="font-size:0.95rem;">${bActionText} (${bActionDmg} Dmg)</span>
                        </div>
                        
                        <p style="font-size: 0.8rem; margin: 0 0 4px 0;"><strong>Speed:</strong> <span style="color:var(--accent-blue); text-transform:uppercase;">${b.speed}</span></p>
                        <p style="font-size: 0.8rem; color: #999; margin: 0; line-height:1.3;"><strong>Passive:</strong> ${b.m}</p>
                        ${b.id === 'golem' ? `<div style="font-size:0.85rem; margin-top:5px; color:${golemStoneskinBroken ? 'var(--accent-red)' : 'var(--accent-blue)'};"><strong>Stoneskin:</strong> ${golemStoneskinBroken ? 'BROKEN' : 'ACTIVE'}</div>` : ''}
                    </div>
                    
                    <!-- Bottom: Horizontal Actions -->
                    <div class="boss-actions-row" id="main-action-buttons">
                        <button class="btn-red btn-console" onclick="triggerStandardAttack()">
                            <span style="font-size:1.1rem;">⚔️</span> Attack
                        </button>
                        <button class="btn-console" style="background:#b45309; color:white;" onclick="toggleAdrenalinePad()">
                            <span style="font-size:1.1rem;">🔥</span> Surge
                        </button>
                        <button class="btn-blue btn-console ${isDefendExhausted ? 'btn-exhausted' : ''}" onclick="${isDefendExhausted ? '' : 'executeClash(\'defend\')'}">
                            <span style="font-size:1.1rem;">${isDefendExhausted ? '❌' : '🛡️'}</span> ${isDefendExhausted ? 'Exhausted' : 'Defend'}
                        </button>
                    </div>

                    <!-- Hidden Adrenaline Pad -->
                    <div id="adren-pad" style="display:none; flex-direction:column; background: #0a0a0c; padding: 10px; border-radius: 8px; border: 1px solid #333;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                            <span style="font-size:0.75rem; color:#aaa;">INPUT 1D6 ROLL:</span>
                            <button onclick="cancelAdrenaline()" style="background:transparent; color:#888; border:none; padding:4px 8px; font-size:1rem; width:auto; font-weight:bold;">✖</button>
                        </div>
                        <div class="adren-row">
                            <button class="adren-btn" onclick="executeClash('adrenaline', 1)">1</button>
                            <button class="adren-btn" onclick="executeClash('adrenaline', 2)">2</button>
                            <button class="adren-btn" onclick="executeClash('adrenaline', 3)">3</button>
                            <button class="adren-btn" onclick="executeClash('adrenaline', 4)">4</button>
                            <button class="adren-btn" onclick="executeClash('adrenaline', 5)">5</button>
                            <button class="adren-btn" onclick="executeClash('adrenaline', 6)">6</button>
                        </div>
                    </div>
                </div>
                <div id="boss-outcome-log">${lastRoundLog}</div>
            `;
            
            document.getElementById('boss-ui').innerHTML = html;
            document.getElementById('boss-ui').style.display = 'block';
        }
        function toggleAdrenalinePad() {
            document.getElementById('main-action-buttons').style.display = 'none';
            document.getElementById('adren-pad').style.display = 'flex';
        }

        function cancelAdrenaline() {
            document.getElementById('adren-pad').style.display = 'none';
            document.getElementById('main-action-buttons').style.display = 'flex';
        }

        function triggerStandardAttack() {
            // Uses a native dialog interrupt instead of a web form to keep the UI clean
            let dmgInput = prompt("Enter the damage of your equipped Relic/Weapon:", "10");
            let pDmg = parseInt(dmgInput);
            if (isNaN(pDmg) || pDmg < 0) return; // Cancelled
            executeClash('attack', 0, pDmg);
        }

        function executeClash(actionType, adrenRoll = 0, manualDmg = 0) {
            let b = currentBoss;
            let pDefended = (actionType === 'defend');
            
            let pDmg = 0;
            let bDmg = b.intent_dmg;
            let finalIncoming = bDmg;
            
            let playerActionLog = "";
            let bossActionLog = "";
            let initiativeLog = "";
            let armorShattered = false;

            // --- STEP A & B: Determine Initiative ---
            let pSpeedVal = (actionType === 'adrenaline') ? 2 : 1; // 2 = fast, 1 = normal
            let bSpeedVal = (b.speed === 'fast') ? 2 : (b.speed === 'slow') ? 0 : 1;
            
            let firstStriker = "";
            let pWinsTie = Math.random() < 0.5;

            if (pDefended) {
                firstStriker = "boss"; // Player doesn't strike, Boss effectively goes first
                initiativeLog = `<div style="color:#888; font-style:italic; border-bottom:1px solid #333; padding-bottom:6px; margin-bottom:8px;">🛡️ You took a preemptive defensive stance.</div>`;
            } else if (pSpeedVal > bSpeedVal) {
                firstStriker = "player";
                initiativeLog = `<div style="color:var(--accent-green); font-style:italic; border-bottom:1px solid #333; padding-bottom:6px; margin-bottom:8px;">⚡ You strike first with superior speed!</div>`;
            } else if (bSpeedVal > pSpeedVal) {
                firstStriker = "boss";
                initiativeLog = `<div style="color:var(--accent-red); font-style:italic; border-bottom:1px solid #333; padding-bottom:6px; margin-bottom:8px;">⚡ The ${b.n} strikes first with superior speed!</div>`;
            } else {
                firstStriker = pWinsTie ? "player" : "boss";
                initiativeLog = `<div style="color:var(--accent-yellow); font-style:italic; border-bottom:1px solid #333; padding-bottom:6px; margin-bottom:8px;">⚡ You both lunge simultaneously, but ${pWinsTie ? 'you land your blow' : `the ${b.n} lands its blow`} a fraction of a second faster!</div>`;
            }

            // --- PRE-COMBAT: Set Player Damage Intent & Knight Reset ---
            if (actionType === 'attack') {
                pDmg = manualDmg;
            } else if (actionType === 'adrenaline') {
                if (adrenRoll <= 2) pDmg = 10;
                else if (adrenRoll <= 4) pDmg = 20;
                else pDmg = 30;
            }

            if (b.id === 'knight' && pDefended) {
                knightUnstoppableDmg = 10;
                playerActionLog += `<div style="color:var(--accent-blue); font-size:0.9rem;">🛡️ Your defense reset the Knight's momentum!</div>`;
            }

            // --- ACTION HANDLERS ---
            const processPlayerAttack = () => {
                if (pDefended || pDmg === 0) return;
                
                let actualPDmg = pDmg;

                // Boss Passives (Mitigation/Avoidance)
                if (b.id === 'illusionist' && Math.random() < 0.33) {
                    actualPDmg = 0;
                    playerActionLog += `<div style="color:var(--accent-purple); font-size:0.9rem; margin-top:4px;">✨ Your strike shatters an illusion! (Deals 0 Damage).</div>`;
                }
                if (b.id === 'golem') {
                    if (actionType === 'adrenaline') {
                        golemStoneskinBroken = true;
                        playerActionLog += `<div style="color:var(--accent-yellow); font-size:0.9rem; margin-top:4px;">💥 Adrenaline Surge shattered the Stoneskin!</div>`;
                    } else if (!golemStoneskinBroken) {
                        actualPDmg = 5;
                        golemDamageTaken += actualPDmg;
                        playerActionLog += `<div style="color:#aaa; font-size:0.9rem; margin-top:4px;">🪨 Stoneskin mitigates your strike to 5 damage.</div>`;
                        if (golemDamageTaken >= 20) {
                            golemStoneskinBroken = true;
                            playerActionLog += `<div style="color:var(--accent-yellow); font-size:0.9rem; margin-top:4px;">💥 The Golem's Stoneskin has broken!</div>`;
                        }
                    }
                }

                // Apply Damage to Boss
                currentBossHP -= actualPDmg;
                if (currentBossHP < 0) currentBossHP = 0;
                
                playerActionLog = `<div style="margin-bottom:2px;">🗡️ You hit ${b.n} for <strong style="color:white;">${actualPDmg}</strong> damage.</div>` + playerActionLog;

                // Boss Passives (Recoil)
                if (b.id === 'dragon' && actualPDmg > 0 && hp > 0) {
                    hp -= 5;
                    playerActionLog += `<div style="color:var(--accent-green); font-size:0.9rem; margin-top:4px;">🧪 Acid Blood burns you for 5 recoil damage!</div>`;
                }
            };

            const processBossAttack = () => {
                // Apply Player Defenses
                if (pDefended && bDmg > 0) finalIncoming = Math.floor(bDmg / 2);
                if (armorEquipped) {
                    finalIncoming = Math.max(0, finalIncoming - 5);
                    if (bDmg >= 15) {
                        armorEquipped = false;
                        armorShattered = true;
                    }
                }

                // Apply Damage to Player
                hp -= finalIncoming;
                if (hp < 0) hp = 0;

                bossActionLog = `<div style="margin-bottom:2px;">🩸 ${b.n} hit you for <strong style="color:var(--accent-red);">${finalIncoming}</strong> damage.</div>`;
                
                if (armorShattered) bossActionLog += `<div style="color:var(--accent-yellow); font-size:0.9rem; margin-top:4px;">🛡️ Your Magic Armor shattered!</div>`;

                // Boss Passives (On-Hit Effects)
                if (b.id === 'dragon' && b.current_effect === 'poison') {
                    addStatus('poison');
                    bossActionLog += `<div style="color:var(--accent-green); font-size:0.9rem; margin-top:4px;">🤢 You were poisoned by Venom Breath!</div>`;
                }
                if (b.id === 'vampire' && finalIncoming > 0) {
                    let healAmt = Math.floor(finalIncoming / 2);
                    currentBossHP = Math.min(b.max_h, currentBossHP + healAmt);
                    bossActionLog += `<div style="color:var(--accent-red); font-size:0.9rem; margin-top:4px;">🦇 Life Siphon healed the Vampire for ${healAmt} HP!</div>`;
                }
                if (b.id === 'knight') {
                    knightUnstoppableDmg += 5; 
                }
            };

            // --- STEP C, D, & E: Execute Clash Sequentially ---
            if (firstStriker === "player") {
                processPlayerAttack();
                if (currentBossHP > 0 && hp > 0) {
                    processBossAttack();
                } else if (currentBossHP === 0) {
                    bossActionLog = `<div style="color:#666; text-decoration:line-through; font-size:0.9rem; margin-top:4px;">The ${b.n}'s attack was cancelled.</div>`;
                }
            } else {
                processBossAttack();
                if (hp > 0 && currentBossHP > 0) {
                    processPlayerAttack();
                } else if (hp === 0) {
                    playerActionLog += `<div style="color:#666; text-decoration:line-through; font-size:0.9rem; margin-top:4px;">Your attack was cancelled.</div>`;
                }
            }

            // --- FINAL: Update State & Compile Log ---
            updatePlayerUI();

            // Assemble the logs visually in the correct order
            let combinedLogs = firstStriker === 'player' 
                ? `<div style="margin-bottom:10px;">${playerActionLog}</div><div>${bossActionLog}</div>` 
                : `<div style="margin-bottom:10px;">${bossActionLog}</div><div>${playerActionLog}</div>`;

            lastRoundLog = `
                <div style="background:#111; border: 1px solid #333; padding: 12px; border-radius: 6px; text-align:left; line-height:1.4;">
                    <h3 style="color:var(--accent-blue); margin-top:0; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span>ROUND ${bossRound}</span>
                        <span style="font-size:0.75rem; color:#666; background:#222; padding:2px 6px; border-radius:4px;">ACTION LOG</span>
                    </h3>
                    ${initiativeLog}
                    <div style="display:flex; flex-direction:column;">
                        ${combinedLogs}
                    </div>
                </div>
            `;

            if (currentBossHP === 0 && hp > 0) {
                document.getElementById('boss-ui').innerHTML = `
                    ${lastRoundLog}
                    <div style="text-align:center; margin-top: 15px;">
                        <h2 style="color:var(--accent-green)">VICTORY!</h2><p>Reward: ${b.r}</p>
                        <button class="btn-blue btn-console" style="width:100%;" onclick="clearBoss()">Conclude Combat</button>
                    </div>
                `;
            } else if (hp === 0) {
                document.getElementById('boss-ui').innerHTML = `
                    ${lastRoundLog}
                    <div style="text-align:center; margin-top: 15px;">
                        <h2 style="color:var(--accent-red)">YOU DIED!</h2>
                        <button class="btn-red btn-console" style="width:100%;" onclick="clearBoss()">Accept Fate</button>
                    </div>
                `;
            } else {
                bossRound++;
                renderBossUI(); 
            }
        }

        function clearBoss() {
            // Hard reset all modifiers
            golemStoneskinBroken = false;
            golemDamageTaken = 0;
            knightUnstoppableDmg = 10;
            isDefendExhausted = false; 
            lastRoundLog = ""; 

            document.getElementById('boss-ui').style.display = 'none';
            currentBoss = null;
            printToLog(`<h3 style="color:#666; margin-top: 40px;">Combat Concluded</h3>`);
        }

        // --- NAVIGATION LOGIC ---
        // function switchTab(tab) {
        //     document.getElementById('tab-player').classList.remove('active');
        //     document.getElementById('tab-decks').classList.remove('active');
        //     document.getElementById('nav-player').classList.remove('active');
        //     document.getElementById('nav-decks').classList.remove('active');
            
        //     document.getElementById('tab-' + tab).classList.add('active');
        //     document.getElementById('nav-' + tab).classList.add('active');
        // }
        // --- NAVIGATION LOGIC ---
        function switchTab(tab) {
            document.getElementById('tab-player').classList.remove('active');
            document.getElementById('tab-decks').classList.remove('active');
            document.getElementById('tab-arena').classList.remove('active');
            document.getElementById('nav-player').classList.remove('active');
            document.getElementById('nav-decks').classList.remove('active');
            document.getElementById('nav-arena').classList.remove('active');
            
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
            
            if (tab === 'arena') {
                renderArena();
            }
        }
        updatePlayerUI();
// --- PVP ARENA ENGINE STATE ---
        let pvpPhase = 1; // 1: Select, 2: Locked, 3: Reveal & Calculate
        let pvpStance = null; 
        let pvpStagedAP = 3;
        let pvpStagedActions = []; 
        
        // New variables for the visual calculator
        let pvpPendingHPChange = 0;
        let pvpPendingPoison = false;

        // Core Renderer for the Arena Tab
        function renderArena() {
            const container = document.getElementById('arena-stage');
            
            if (pvpPhase === 1) {
                // --- PHASE 1: ACTION SELECTION ---
                let handHTML = '';
                hand.forEach((cardName, idx) => {
                    let item = ITEM_DB[cardName] || { ap: 0, stance: "neutral", desc: "Unknown" };
                    let isAlreadyStaged = pvpStagedActions.some(a => a.idx === idx);
                    
                    let stanceLocked = (pvpStance === 'attack' && item.stance === 'defense') || 
                                       (pvpStance === 'defense' && item.stance === 'attack');
                    let canAfford = pvpStagedAP >= item.ap;
                    let isClickable = !stanceLocked && canAfford && !isAlreadyStaged;

                    handHTML += `
                        <div class="card-item" style="padding: 8px; margin-bottom: 6px; ${!isClickable && !isAlreadyStaged ? 'opacity: 0.3;' : ''}">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <strong style="color:var(--accent-yellow); font-size:0.95rem;">${cardName}</strong>
                                    <div style="font-size:0.75rem; color:#aaa;">[${item.stance.toUpperCase()}] - ${item.desc}</div>
                                </div>
                                ${isAlreadyStaged ? 
                                    `<button style="width:auto; padding: 6px 12px; font-size:0.8rem; background:#ef4444;" onclick="unstageArenaItem(${idx})">Remove</button>` :
                                    `<button class="${isClickable ? 'btn-blue' : 'btn-exhausted'}" style="width:auto; padding: 6px 12px; font-size:0.8rem;" ${!isClickable ? 'disabled' : ''} onclick="stageArenaItem(${idx}, '${cardName}')">+ Stg (${item.ap} AP)</button>`
                                }
                            </div>
                        </div>`;
                });

                let baseAttackValid = (pvpStance !== 'defense' && pvpStagedAP >= 1 && !pvpStagedActions.some(a => a.type === 'base_attack'));
                let baseDefendValid = (pvpStance !== 'attack' && pvpStagedAP >= 1 && !pvpStagedActions.some(a => a.type === 'base_defend'));

                container.innerHTML = `
                    <div class="section" style="background:#16161e; text-align:center; padding:12px; border: 1px solid var(--accent-blue);">
                        <span style="font-size:0.85rem; color:#aaa;">STAGED AP REMAINING:</span>
                        <div style="font-size:2.5rem; font-weight:bold; color:var(--accent-blue);">${pvpStagedAP} / ${maxAP}</div>
                    </div>

                    <div class="section">
                        <h4>Base Stances (Choose 1 max)</h4>
                        <div class="grid-2">
                            ${pvpStagedActions.some(a => a.type === 'base_attack') ?
                                `<button class="btn-red" onclick="unstageBaseAction('base_attack')">Remove Base Attack</button>` :
                                `<button class="btn-red" ${!baseAttackValid ? 'disabled style="opacity:0.3;"' : ''} onclick="stageBaseAction('attack')">⚔️ Base Attack (1 AP)</button>`
                            }
                            ${pvpStagedActions.some(a => a.type === 'base_defend') ?
                                `<button class="btn-blue" onclick="unstageBaseAction('base_defend')">Remove Base Defend</button>` :
                                `<button class="btn-blue" ${!baseDefendValid ? 'disabled style="opacity:0.3;"' : ''} onclick="stageBaseAction('defend')">🛡️ Base Defend (1 AP)</button>`
                            }
                        </div>
                    </div>

                    <div class="section">
                        <h4>Staged Spells & Items</h4>
                        ${pvpStagedActions.length === 0 ? '<p style="color:#666; font-size:0.9rem; margin:0;">No actions staged yet...</p>' : ''}
                        <div id="arena-staged-list" style="margin-bottom:10px;">
                            ${pvpStagedActions.map(a => `<div style="font-size:0.9rem; padding:4px 0; border-bottom:1px solid #333; color:var(--accent-green);">✔️ ${a.name} (${a.cost} AP)</div>`).join('')}
                        </div>
                        <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
                        <h5>My Card Inventory</h5>
                        ${hand.length === 0 ? '<p style="color:#565656; font-size:0.85rem;">Inventory empty.</p>' : handHTML}
                    </div>

                    <button class="btn-green" style="padding:18px;" onclick="lockInArenaChoices()">🔒 LOCK IN CHOICES</button>
                `;
            } 
            else if (pvpPhase === 2) {
                // --- PHASE 2: LOCKED SELECTION SCREEN ---
                container.innerHTML = `
                    <div class="section" style="text-align:center; padding:40px 20px; background:#0b0b0f; border: 2px dashed #444;">
                        <div style="font-size:4rem; margin-bottom:10px;">🔒</div>
                        <h2 style="color:#aaa; margin-bottom:5px;">CHOICES HIDDEN</h2>
                        <p style="color:#666; font-size:0.95rem; margin:0 0 25px 0;">Hold phone up or place face up on board. Press reveal together.</p>
                        
                        <button class="btn-red" style="font-size:1.4rem; padding:20px; margin-bottom:15px;" onclick="pvpPhase = 3; renderArena();">👁️ REVEAL SCREEN</button>
                        <button style="background:transparent; color:#888; font-size:0.9rem;" onclick="pvpPhase = 1; renderArena();">↩ Cancel & Edit Choices</button>
                    </div>
                `;
            } 
            else if (pvpPhase === 3) {
                // --- PHASE 3: THE REVEAL & CALCULATOR ---
                
                // Calculate projected HP for visual feedback
                let projectedHP = hp + pvpPendingHPChange;
                if (projectedHP > 100) projectedHP = 100;
                if (projectedHP < 0) projectedHP = 0;
                
                let hpColor = (projectedHP < hp) ? "var(--accent-red)" : (projectedHP > hp) ? "var(--accent-green)" : "white";
                let mathText = pvpPendingHPChange > 0 ? `+${pvpPendingHPChange}` : pvpPendingHPChange === 0 ? "0" : `${pvpPendingHPChange}`;

                container.innerHTML = `
                    <div class="section" style="border: 2px solid var(--accent-yellow); background:#111; margin-bottom:15px;">
                        <h3 style="color:var(--accent-yellow); margin-top:0; text-align:center; letter-spacing:1px;">MY ACTION REVEAL</h3>
                        
                        <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px;">
                            ${pvpStagedActions.map(a => `
                                <div style="background:#1a1a24; padding:12px; border-radius:6px; border-left:4px solid var(--accent-blue);">
                                    <div style="font-weight:bold; font-size:1.1rem; color:white;">${a.name.toUpperCase()}</div>
                                    <div style="font-size:0.9rem; color:#ccc; margin-top:2px;">${a.text}</div>
                                </div>
                            `).join('')}
                            ${pvpStagedActions.length === 0 ? '<div style="text-align:center; color:#ef4444; font-weight:bold;">⚠️ NO ACTIONS TAKEN (AP WASTED)</div>' : ''}
                        </div>

                        <div style="background:#222; padding:10px; border-radius:6px; font-size:0.85rem; color:#aaa; line-height:1.4;">
                            <strong>Stance Resolution Matrix:</strong><br>
                            • Basic Attack vs Basic Attack: Both take 10 DMG.<br>
                            • Basic Attack vs Basic Defend: Play RPS! (Attacker wins = Defender takes 10 DMG. Defender wins = Defender heals +10 HP).<br>
                            • Basic Defend vs Basic Defend: Stalemate.<br>
                            • Defend vs Weapon Items: Defender takes (Weapon DMG - 10) DMG.
                        </div>
                    </div>

                    <div class="section" style="text-align:center; background:#16161e; border: 1px solid #444;">
                        <h3 style="margin-top:0; color:#888;">RESOLUTION CALCULATOR</h3>
                        
                        <div style="display:flex; justify-content:center; align-items:center; gap:15px; margin-bottom:15px; background:#000; padding:10px; border-radius:8px;">
                            <div style="text-align:right;">
                                <div style="font-size:0.8rem; color:#666;">CURRENT</div>
                                <div style="font-size:2rem; color:#888;">${hp}</div>
                            </div>
                            <div style="font-size:2rem; color:#444;">➔</div>
                            <div style="text-align:left;">
                                <div style="font-size:0.8rem; color:${hpColor};">NEW HP (${mathText})</div>
                                <div style="font-size:3rem; font-weight:bold; color:${hpColor}; line-height:1;">${projectedHP}</div>
                            </div>
                        </div>
                        
                        <div style="margin-bottom:15px;">
                            <div style="font-size:0.8rem; font-weight:bold; color:#ef4444; margin-bottom:4px; text-align:left;">INFLICT DAMAGE:</div>
                            <div class="grid-4">
                                <button class="btn-red" style="padding:12px 0;" onclick="stagePvPMath(-20)">-20</button>
                                <button class="btn-red" style="padding:12px 0;" onclick="stagePvPMath(-15)">-15</button>
                                <button class="btn-red" style="padding:12px 0;" onclick="stagePvPMath(-10)">-10</button>
                                <button class="btn-red" style="padding:12px 0;" onclick="stagePvPMath(-5)">-5</button>
                            </div>
                        </div>

                        <div style="margin-bottom:15px;">
                            <div style="font-size:0.8rem; font-weight:bold; color:var(--accent-green); margin-bottom:4px; text-align:left;">APPLY HEALING / STANCE BONUS:</div>
                            <div class="grid-2">
                                <button class="btn-green" style="padding:12px 0;" onclick="stagePvPMath(10)">+10 HP (RPS Win)</button>
                                <button class="btn-green" style="padding:12px 0;" onclick="stagePvPMath(5)">+5 HP</button>
                            </div>
                        </div>

                        <div style="display:flex; gap:10px; margin-bottom:15px;">
                            <button style="flex:1; padding:12px; background:${pvpPendingPoison ? 'var(--accent-green)' : '#222'}; color:${pvpPendingPoison ? '#000' : '#aaa'}; border:1px solid var(--accent-green);" onclick="togglePvPPoison()">
                                ${pvpPendingPoison ? '✔️ Poison Applied' : '+ Apply Poison'}
                            </button>
                            <button style="flex:0.5; background:#333; color:#aaa; font-size:0.9rem;" onclick="resetPvPMath()">↺ Reset Math</button>
                        </div>

                        <button class="btn-blue" style="padding:18px; font-size:1.3rem; width:100%;" onclick="processPvpRoundResolution()">🏁 COMMIT CHANGES</button>
                    </div>
                `;
            } 
        }
        // Phase 1 Logic Processors
        function stageBaseAction(type) {
            if (type === 'attack') {
                pvpStagedActions.push({ type: 'base_attack', name: 'Base Attack', cost: 1, text: 'Deals 10 Damage to opponent.' });
                pvpStance = 'attack';
            } else {
                pvpStagedActions.push({ type: 'base_defend', name: 'Base Defend', cost: 1, text: 'Triggers Defense calculations. Blocks 10 Dmg vs Items.' });
                pvpStance = 'defense';
            }
            pvpStagedAP -= 1;
            renderArena();
        }

        function unstageBaseAction(type) {
            pvpStagedActions = pvpStagedActions.filter(a => a.type !== type);
            pvpStagedAP += 1;
            if (!pvpStagedActions.some(a => a.type === 'base_attack' || a.type === 'base_defend' || (ITEM_DB[a.name] && ITEM_DB[a.name].stance !== 'neutral'))) {
                pvpStance = null;
            }
            renderArena();
        }

        function stageArenaItem(handIdx, cardName) {
            let item = ITEM_DB[cardName];
            pvpStagedActions.push({ idx: handIdx, type: 'item', name: cardName, cost: item.ap, text: item.desc });
            pvpStagedAP -= item.ap;
            if (item.stance !== 'neutral') pvpStance = item.stance;
            renderArena();
        }

        function unstageArenaItem(handIdx) {
            let action = pvpStagedActions.find(a => a.idx === handIdx);
            pvpStagedAP += action.cost;
            pvpStagedActions = pvpStagedActions.filter(a => a.idx !== handIdx);
            
            // Recalculate Stance Limiters
            let hasAttack = pvpStagedActions.some(a => a.type === 'base_attack' || (ITEM_DB[a.name] && ITEM_DB[a.name].stance === 'attack'));
            let hasDefense = pvpStagedActions.some(a => a.type === 'base_defend' || (ITEM_DB[a.name] && ITEM_DB[a.name].stance === 'defense'));
            pvpStance = hasAttack ? 'attack' : (hasDefense ? 'defense' : null);
            renderArena();
        }

        function lockInArenaChoices() {
            pvpPhase = 2;
            renderArena();
        }
        // Phase 3 Calculator Functions
        function stagePvPMath(amt) {
            pvpPendingHPChange += amt;
            renderArena();
        }

        function togglePvPPoison() {
            pvpPendingPoison = !pvpPendingPoison;
            renderArena();
        }

        function resetPvPMath() {
            pvpPendingHPChange = 0;
            pvpPendingPoison = false;
            renderArena();
        }

        // Phase 4 Finalizing Logic Engine
        // Phase 3 Finalizing Logic Engine
        function processPvpRoundResolution() {
            // 1. Apply the Pending Math visually generated in the calculator
            hp += pvpPendingHPChange;
            if (hp > 100) hp = 100;
            if (hp < 0) hp = 0;

            if (pvpPendingPoison) {
                addStatus('poison');
            }

            // 2. Process deletions out of inventory for things actually consumed
            let itemsToDiscard = pvpStagedActions.filter(a => a.type === 'item').map(a => a.idx);
            itemsToDiscard.sort((a, b) => b - a);
            itemsToDiscard.forEach(idx => hand.splice(idx, 1));

            // 3. Process Environmental Poison if it ticks on player
            if (poisonCount > 0 && !pvpPendingPoison) { 
                // Only tick down existing poison if they weren't JUST poisoned this round
                hp -= 5;
                poisonCount--;
                if(hp < 0) hp = 0;
            }

            // 4. Officialize persistent state values
            currentAP = pvpStagedAP; // Inherit remaining AP deductions
            currentAP = maxAP;       // Automatically refresh up to max for the next turn loop

            // 5. Flush states for the next round loop
            pvpPhase = 1;
            pvpStance = null;
            pvpStagedAP = maxAP;
            pvpStagedActions = [];
            pvpPendingHPChange = 0;
            pvpPendingPoison = false;

            updatePlayerUI();
            renderArena();
        }
    </script>
</body>
</html>
